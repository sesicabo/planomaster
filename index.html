<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Planos de Aula - SESI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <fieldset>
            <legend>Cabeçalho do Documento</legend>
            <div class="grid-2">
                <div class="form-group">
                    <label>Unidade Escolar:</label>
                    <input type="text" id="unidade" value="SESI – CABO DE SANTO AGOSTINHO">
                </div>
                <div class="form-group">
                    <label>Professor:</label>
                    <input type="text" id="professor" value="Victor Roberto">
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Área de conhecimento:</label>
                    <input type="text" id="area" value="CIÊNCIAS HUMANAS E SOCIAIS APLICADAS">
                </div>
                <div class="form-group">
                    <label>Série e Turma:</label>
                    <input type="text" id="turma" placeholder="Ex: 1º ANO (B)">
                </div>
            </div>
            <div class="grid-3">
                <div class="form-group">
                    <label>Bimestre:</label>
                    <select id="bimestre">
                        <option value="1º BIMESTRE">1º BIMESTRE</option>
                        <option value="2º BIMESTRE">2º BIMESTRE</option>
                        <option value="3º BIMESTRE">3º BIMESTRE</option>
                        <option value="4º BIMESTRE">4º BIMESTRE</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Início da Quinzena:</label>
                    <input type="date" id="data-inicio">
                </div>
                <div class="form-group">
                    <label>Fim da Quinzena:</label>
                    <input type="date" id="data-fim">
                </div>
            </div>
            <div class="form-group">
                <label>Capítulo / Referência:</label>
                <input type="text" id="capitulo" placeholder="Ex: CADERNO 1 – CAPÍTULO 4">
            </div>
        </fieldset>

        <fieldset class="pdf-section">
            <legend>Material Didático (PDF)</legend>
            <p style="font-size: 0.9em; color: #555; margin-top: 0;">Anexe o PDF e selecione as disciplinas para a IA extrair temas específicos.</p>
            
            <div class="form-group">
                <label>Extrair temas focados em:</label>
                <div class="dias-semana" style="margin-bottom: 15px;">
                    <label class="check-container"><input type="checkbox" value="História" class="filtro-disciplina" checked> História</label>
                    <label class="check-container"><input type="checkbox" value="Geografia" class="filtro-disciplina"> Geografia</label>
                    <label class="check-container"><input type="checkbox" value="Filosofia" class="filtro-disciplina" checked> Filosofia</label>
                    <label class="check-container"><input type="checkbox" value="Sociologia" class="filtro-disciplina"> Sociologia</label>
                    <label class="check-container"><input type="checkbox" value="Português" class="filtro-disciplina"> Português</label>
                    <label class="check-container"><input type="checkbox" value="Literatura" class="filtro-disciplina"> Literatura</label>
                    <label class="check-container"><input type="checkbox" value="Inglês" class="filtro-disciplina"> Inglês</label>
                    <label class="check-container"><input type="checkbox" value="Artes" class="filtro-disciplina"> Artes</label>
                    <label class="check-container"><input type="checkbox" value="Matemática" class="filtro-disciplina"> Matemática</label>
                    <label class="check-container"><input type="checkbox" value="Geometria" class="filtro-disciplina"> Geometria</label>
                    <label class="check-container"><input type="checkbox" value="Física" class="filtro-disciplina"> Física</label>
                    <label class="check-container"><input type="checkbox" value="Química" class="filtro-disciplina"> Química</label>
                    <label class="check-container"><input type="checkbox" value="Biologia" class="filtro-disciplina"> Biologia</label>
                </div>
            </div>

            <div class="form-group">
                <input type="file" id="pdf-upload" accept="application/pdf">
                <button onclick="extrairTemasPDF()" class="btn-secondary" id="btn-extrair">📄 Extrair Assuntos do PDF</button>
            </div>
            <div id="status-extracao" style="font-size: 0.9em; color: var(--primary-color); font-weight: bold;"></div>
            <datalist id="lista-temas-sugeridos"></datalist>
        </fieldset>

        <fieldset>
            <legend>Base Curricular</legend>
            <div class="form-group" style="margin-bottom: 0;">
                <label>Habilidades da BNCC/SESI:</label>
                <textarea id="habilidades" rows="4" placeholder="Ex: SESI.EM13CHS101.d.3 : Identificar os processos histórico-sociais..."></textarea>
            </div>
        </fieldset>

        <fieldset>
            <legend>Horário Semanal (Dias de aula nesta turma)</legend>
            <div class="dias-semana-avancado">
                <div class="dia-row"><label class="check-container"><input type="checkbox" value="1" class="dia-chk" onchange="toggleDuracao(this, 1)"> Segunda-feira</label><select id="duracao-1" class="select-duracao" disabled><option value="50">50 minutos (1 aula)</option><option value="100">100 minutos (2 aulas)</option></select></div>
                <div class="dia-row"><label class="check-container"><input type="checkbox" value="2" class="dia-chk" onchange="toggleDuracao(this, 2)"> Terça-feira</label><select id="duracao-2" class="select-duracao" disabled><option value="50">50 minutos (1 aula)</option><option value="100">100 minutos (2 aulas)</option></select></div>
                <div class="dia-row"><label class="check-container"><input type="checkbox" value="3" class="dia-chk" onchange="toggleDuracao(this, 3)"> Quarta-feira</label><select id="duracao-3" class="select-duracao" disabled><option value="50">50 minutos (1 aula)</option><option value="100">100 minutos (2 aulas)</option></select></div>
                <div class="dia-row"><label class="check-container"><input type="checkbox" value="4" class="dia-chk" onchange="toggleDuracao(this, 4)"> Quinta-feira</label><select id="duracao-4" class="select-duracao" disabled><option value="50">50 minutos (1 aula)</option><option value="100">100 minutos (2 aulas)</option></select></div>
                <div class="dia-row"><label class="check-container"><input type="checkbox" value="5" class="dia-chk" onchange="toggleDuracao(this, 5)"> Sexta-feira</label><select id="duracao-5" class="select-duracao" disabled><option value="50">50 minutos (1 aula)</option><option value="100">100 minutos (2 aulas)</option></select></div>
            </div>
            <button onclick="gerarCamposDeAula()" class="btn-secondary">📅 Gerar Datas de Aula Automaticamente</button>
        </fieldset>

        <fieldset id="sessao-temas" style="display: none;">
            <legend>Temas, Disciplina e Metodologia</legend>
            <div id="aulas-container"></div>
            <button onclick="gerarPlano()" class="btn-primary" id="btn-gerar">🤖 Gerar Plano de Aula Completo com IA</button>
        </fieldset>

        <fieldset class="output-section" id="sessao-resultado" style="display: none;">
            <legend>Plano de Aula Gerado</legend>
            <div style="display: flex; justify-content: flex-end; margin-bottom: 15px;">
                <button onclick="exportarParaPDF()" class="btn-success" id="btn-exportar" style="width: auto;">📥 Exportar Plano para PDF</button>
            </div>
            <div id="container-impressao">
                <div id="resultado-plano"></div>
            </div>
        </fieldset>
    </div>
    <script src="script.js?v=12"></script>
</body>
</html>
